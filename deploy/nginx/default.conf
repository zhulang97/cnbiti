map $http_upgrade $connection_upgrade {
  default upgrade;
  '' close;
}

upstream cnbjti_web {
  server host.docker.internal:3000;
}

upstream cnbjti_admin {
  server host.docker.internal:3003;
}

upstream cnbjti_api {
  server host.docker.internal:8080;
}

upstream cnbjti_minio {
  server host.docker.internal:9002;
}

server {
  listen 80;
  server_name cnbjti.com www.cnbjti.com;

  location ~* (^|/)(\.git|\.env|wp-admin|wp-content|wp-includes|xmlrpc\.php|wlwmanifest\.xml)(/|$) {
    return 404;
  }

  location = /_next {
    return 404;
  }

  location ^~ /_next/ {
    return 404;
  }

  location /api/ {
    proxy_pass http://cnbjti_api;
    proxy_http_version 1.1;
    proxy_set_header Host $host;
    proxy_set_header X-Real-IP $remote_addr;
    proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    proxy_set_header X-Forwarded-Proto $scheme;
  }

  location /cnbjti-assets/ {
    proxy_pass http://cnbjti_minio;
    proxy_http_version 1.1;
    proxy_set_header Host host.docker.internal:9002;
    proxy_set_header X-Real-IP $remote_addr;
    proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    proxy_set_header X-Forwarded-Proto $scheme;
  }

  location ^~ /_nuxt/ {
    proxy_pass http://cnbjti_web;
    proxy_http_version 1.1;
    proxy_set_header Host $host;
    proxy_set_header X-Real-IP $remote_addr;
    proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    proxy_set_header X-Forwarded-Proto $scheme;
    add_header Cache-Control "public, max-age=31536000, immutable";
  }

  location / {
    proxy_pass http://cnbjti_web;
    proxy_http_version 1.1;
    proxy_set_header Host $host;
    proxy_set_header X-Real-IP $remote_addr;
    proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    proxy_set_header X-Forwarded-Proto $scheme;
    proxy_set_header Upgrade $http_upgrade;
    proxy_set_header Connection $connection_upgrade;
  }
}

server {
  listen 80;
  server_name admin.cnbjti.com;

  location /api/ {
    proxy_pass http://cnbjti_api;
    proxy_http_version 1.1;
    proxy_set_header Host $host;
    proxy_set_header X-Real-IP $remote_addr;
    proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    proxy_set_header X-Forwarded-Proto $scheme;
  }

  location / {
    proxy_pass http://cnbjti_admin;
    proxy_http_version 1.1;
    proxy_set_header Host $host;
    proxy_set_header X-Real-IP $remote_addr;
    proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    proxy_set_header X-Forwarded-Proto $scheme;
    proxy_set_header Upgrade $http_upgrade;
    proxy_set_header Connection $connection_upgrade;
  }
}
