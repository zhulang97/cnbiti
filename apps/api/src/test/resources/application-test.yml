spring:
  datasource:
    url: jdbc:h2:mem:cnbjti;MODE=MySQL;DATABASE_TO_LOWER=TRUE;CASE_INSENSITIVE_IDENTIFIERS=TRUE;DB_CLOSE_DELAY=-1
    username: sa
    password:
    driver-class-name: org.h2.Driver
  jpa:
    hibernate:
      ddl-auto: validate
    open-in-view: false
  flyway:
    enabled: true

cnbjti:
  cors:
    allowed-origin-patterns: http://localhost:*,http://127.0.0.1:*
  admin:
    bootstrap:
      username: admin
      display-name: admin
      email: admin@cnbjti.com
      password: cnbjti2026
  security:
    token-secret: test-only-cnbjti-admin-token-secret-2026
    token-ttl: 12h
  storage:
    minio:
      endpoint: http://localhost:9000
      access-key: cnbjti
      secret-key: cnbjti2026
      bucket: cnbjti-assets
      public-url: http://localhost:9000/cnbjti-assets
      max-size-bytes: 10485760
      allowed-content-types:
        - image/*
        - application/pdf
        - text/plain
        - text/csv
        - application/msword
        - application/vnd.openxmlformats-officedocument.wordprocessingml.document
        - application/vnd.ms-excel
        - application/vnd.openxmlformats-officedocument.spreadsheetml.sheet
