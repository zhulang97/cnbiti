server:
  port: 8080

spring:
  application:
    name: cnbjti-api
  autoconfigure:
    exclude:
      - org.springframework.boot.autoconfigure.security.servlet.UserDetailsServiceAutoConfiguration
  datasource:
    url: ${MYSQL_URL:jdbc:mysql://127.0.0.1:3306/cnbjti?useSSL=false&allowPublicKeyRetrieval=true&serverTimezone=Asia/Shanghai&characterEncoding=utf8}
    username: ${MYSQL_USER:cnbjti}
    password: ${MYSQL_PASSWORD:cnbjti}
  jpa:
    hibernate:
      ddl-auto: validate
    open-in-view: false
    properties:
      hibernate:
        jdbc:
          time_zone: Asia/Shanghai
  flyway:
    enabled: true
  servlet:
    multipart:
      max-file-size: ${SPRING_MULTIPART_MAX_FILE_SIZE:200MB}
      max-request-size: ${SPRING_MULTIPART_MAX_REQUEST_SIZE:200MB}

springdoc:
  swagger-ui:
    path: /swagger-ui.html

cnbjti:
  cors:
    allowed-origin-patterns: ${CORS_ALLOWED_ORIGIN_PATTERNS:http://localhost:*,http://127.0.0.1:*,http://[::1]:*,https://admin.cnbjti.com,https://cnbjti.com,https://www.cnbjti.com}
  admin:
    bootstrap:
      username: ${ADMIN_BOOTSTRAP_USERNAME:admin}
      display-name: ${ADMIN_BOOTSTRAP_DISPLAY_NAME:admin}
      email: ${ADMIN_BOOTSTRAP_EMAIL:admin@cnbjti.com}
      password: ${ADMIN_BOOTSTRAP_PASSWORD:cnbjti2026}
  security:
    token-secret: ${ADMIN_TOKEN_SECRET:dev-only-change-me-cnbjti-token-secret-2026}
    token-ttl: ${ADMIN_TOKEN_TTL:12h}
  storage:
    minio:
      endpoint: ${MINIO_ENDPOINT:http://localhost:9002}
      access-key: ${MINIO_ACCESS_KEY:minioadmin}
      secret-key: ${MINIO_SECRET_KEY:minioadmin}
      bucket: ${MINIO_BUCKET:cnbjti-assets}
      public-url: ${MINIO_PUBLIC_URL:https://cnbjti.com/cnbjti-assets}
      max-size-bytes: ${MINIO_MAX_SIZE_BYTES:209715200}
      allowed-content-types:
        - image/*
        - video/*
        - application/pdf
        - text/plain
        - text/csv
        - application/msword
        - application/vnd.openxmlformats-officedocument.wordprocessingml.document
        - application/vnd.ms-excel
        - application/vnd.openxmlformats-officedocument.spreadsheetml.sheet
